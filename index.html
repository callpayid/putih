<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>SleepcallPay — Talent Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; min-height: 100vh; }
body {
  font-family: 'Inter', sans-serif;
  background: #020810;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  -webkit-font-smoothing: antialiased;
}
#app {
  width: 100%;
  max-width: 480px;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
  background: linear-gradient(160deg, #020810 0%, #071020 60%, #081525 100%);
}
@media (min-width: 481px) {
  body { padding: 20px 0; background: #000; }
  #app { border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.8); min-height: 90vh; }
}

/* STARFIELD */
.starfield {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  max-width: 480px;
  margin: 0 auto;
}
@keyframes twinkle1 { 0%,100%{opacity:0.2} 50%{opacity:1} }
@keyframes twinkle2 { 0%,100%{opacity:0.4} 50%{opacity:0.9} }
@keyframes twinkle3 { 0%,100%{opacity:0.1} 50%{opacity:0.7} }
@keyframes shootingStar {
  0% { transform: translateX(0) translateY(0); opacity: 0; }
  10% { opacity: 0; }
  20% { opacity: 0.6; }
  75% { opacity: 0.5; }
  100% { transform: translateX(-220px) translateY(110px); opacity: 0; }
}
@keyframes twinkleSpark { 0%,100%{opacity:0.4;transform:scale(0.85)} 50%{opacity:1;transform:scale(1.1)} }
@keyframes logoGlow { 0%,100%{filter:drop-shadow(0 0 4px rgba(252,211,77,0.3))} 50%{filter:drop-shadow(0 0 10px rgba(252,211,77,0.6))} }

/* CONTENT */
.content { position: relative; z-index: 1; padding-bottom: 40px; padding-top: 72px; }

/* PLACEHOLDER CENTER */
.ht-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 80vh; padding: 40px 24px; text-align: center;
}
.ht-placeholder-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.ht-placeholder-title {
  font-family: 'Instrument Serif', serif; font-style: italic; font-size: 22px;
  background: linear-gradient(135deg,#FFF5A0,#FCD34D,#F59E0B);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.ht-placeholder-sub { font-size: 13px; color: rgba(255,255,255,0.3); line-height: 1.6; }

/* NAVBAR */
.navbar {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; z-index: 100;
  background: rgba(2,2,8,0.85);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 0.5px solid rgba(255,255,255,0.06);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-text {
  font-family: 'Instrument Serif', serif; font-style: italic; font-size: 18px;
  background: linear-gradient(135deg,#FFF5A0,#FCD34D,#F59E0B);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 6px rgba(252,211,77,0.4));
}
.navbar-badge {
  font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  background: rgba(252,211,77,0.12); border: 0.5px solid rgba(252,211,77,0.3);
  color: #FCD34D; letter-spacing: 0.06em;
}
.hamburger {
  width: 38px; height: 38px; border-radius: 12px;
  background: rgba(255,255,255,0.07);
  border: 0.5px solid rgba(255,255,255,0.12);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 5px; cursor: pointer;
}
.hamburger span { display: block; width: 18px; height: 2px; border-radius: 2px; background: #fff; }

/* SECTION */
.ht-section { padding: 12px 16px; }

/* PROFILE CARD */
.ht-profile-card {
  background: rgba(255,255,255,0.05);
  border: 0.5px solid rgba(255,255,255,0.09);
  border-radius: 18px; padding: 12px 14px;
  margin-bottom: 10px; position: relative; overflow: hidden;
}
.ht-profile-card::before {
  content: ''; position: absolute; top: -30px; right: -30px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(252,211,77,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.ht-profile-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; position: relative; }
.ht-avatar {
  width: 44px; height: 44px; border-radius: 13px; flex-shrink: 0;
  background: rgba(255,255,255,0.1);
  border: 0.5px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; color: rgba(255,255,255,0.7);
  position: relative;
}
.ht-poin-badge {
  position: absolute; top: -6px; right: -6px;
  background: linear-gradient(135deg,#FFF1B8,#FCD34D,#F59E0B);
  border-radius: 20px; padding: 2px 7px;
  font-size: 10px; font-weight: 900; color: #1a0f00;
  box-shadow: 0 2px 8px rgba(252,211,77,0.4);
  white-space: nowrap; border: 1.5px solid rgba(255,255,255,0.2);
}
.ht-greet { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 2px; }
.ht-name {
  font-size: 17px; font-weight: 800; color: #fff;
  display: flex; align-items: center; gap: 6px;
}
.ht-name-spark { font-size: 18px; }
.ht-meta { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 1px; }
.ht-meta span { color: #FCD34D; font-weight: 700; }

/* POIN */
.ht-poin-wrap { margin-top: 12px; }
.ht-poin-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.ht-poin-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35); letter-spacing: 0.06em; }
.ht-poin-val {
  font-size: 13px; font-weight: 900;
  background: linear-gradient(135deg,#FFF5A0,#FCD34D);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.ht-poin-val span { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.3); -webkit-text-fill-color: rgba(255,255,255,0.3); }
.ht-poin-bar-wrap {
  height: 5px; background: rgba(255,255,255,0.08);
  border-radius: 5px; overflow: hidden;
}
.ht-poin-bar {
  height: 100%; border-radius: 5px;
  background: linear-gradient(90deg,#FCD34D,#F59E0B);
  transition: width 0.6s cubic-bezier(0.22,1,0.36,1);
  box-shadow: 0 0 8px rgba(252,211,77,0.4);
}
.ht-toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 12px;
  background: rgba(255,255,255,0.04);
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: 14px;
}
.ht-toggle-left { display: flex; align-items: center; gap: 10px; }
.ht-online-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #34D399;
  box-shadow: 0 0 8px rgba(52,211,153,0.6); flex-shrink: 0;
  animation: pulse-dot 2s ease-in-out infinite;
}
.ht-offline-dot {
  width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); flex-shrink: 0;
}
@keyframes pulse-dot { 0%,100%{box-shadow:0 0 6px rgba(52,211,153,0.5)} 50%{box-shadow:0 0 14px rgba(52,211,153,0.9)} }
.ht-toggle-text { }
.ht-toggle-status { font-size: 12px; font-weight: 700; color: #fff; }
.ht-toggle-sub { font-size: 9.5px; color: rgba(255,255,255,0.35); margin-top: 1px; }

/* SWITCH */
.ht-switch { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
.ht-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
.ht-switch-track {
  position: absolute; inset: 0; border-radius: 13px; cursor: pointer;
  background: rgba(255,255,255,0.15); transition: background 0.3s;
}
.ht-switch-track.on { background: #34D399; }
.ht-switch-thumb {
  position: absolute; top: 3px; left: 3px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff; transition: transform 0.3s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.ht-switch-thumb.on { transform: translateX(20px); }

/* ORDER MASUK CARD */
.ht-order-card {
  background: linear-gradient(135deg, #1A0818 0%, #2A0F20 100%);
  border: 1px solid rgba(236,72,153,0.3);
  border-radius: 16px; padding: 10px 12px; margin-bottom: 10px;
  position: relative; overflow: hidden;
  box-shadow: 0 4px 24px rgba(236,72,153,0.08);
  display: none;
}
.ht-order-card.show { display: block; animation: slideDown 0.3s cubic-bezier(0.22,1,0.36,1); }
@keyframes slideDown { from{transform:translateY(-10px);opacity:0} to{transform:translateY(0);opacity:1} }

.ht-order-card::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 150px; height: 150px;
  background: radial-gradient(circle, rgba(236,72,153,0.1) 0%, transparent 70%);
  pointer-events: none;
}
.ht-order-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.ht-order-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 9px; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase; color: rgba(236,72,153,0.8);
}
.ht-order-blink {
  width: 7px; height: 7px; border-radius: 50%; background: #EC4899;
  box-shadow: 0 0 8px rgba(236,72,153,0.7);
  animation: blink 1s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.ht-order-timer {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px; font-weight: 700; color: #fff;
  letter-spacing: -0.02em;
}
.ht-order-timer.urgent { color: #EC4899; }

.ht-order-info { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.ht-order-avatar {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800; color: #fff;
  border: 0.5px solid rgba(255,255,255,0.15);
}
.ht-order-client { font-size: 13px; font-weight: 800; color: #fff; }
.ht-order-detail { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 1px; }
.ht-order-price {
  margin-left: auto; font-size: 13px; font-weight: 900;
  color: #FCD34D; filter: drop-shadow(0 0 6px rgba(252,211,77,0.3));
  white-space: nowrap;
}

.ht-order-progress {
  height: 3px; background: rgba(255,255,255,0.08); border-radius: 3px;
  margin-bottom: 8px; overflow: hidden;
}
.ht-order-progress-bar {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, #EC4899, #F97316);
  transition: width 1s linear;
}

.ht-order-actions { display: flex; gap: 8px; }
.ht-btn-tolak {
  flex: 1; height: 36px; border-radius: 10px;
  background: rgba(255,255,255,0.08);
  border: 0.5px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7); font-family: inherit;
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all 0.15s;
}
.ht-btn-tolak:active { background: rgba(255,80,80,0.15); border-color: rgba(255,80,80,0.3); color: #FF6B6B; }
.ht-btn-terima {
  flex: 1; height: 36px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #10B981, #34D399);
  color: #fff; font-family: inherit;
  font-size: 13px; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 16px rgba(52,211,153,0.3);
  transition: all 0.15s;
}
.ht-btn-terima:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(52,211,153,0.2); }

/* SIMULASI BTN */
.ht-sim-btn {
  width: 100%; height: 48px; border-radius: 16px;
  background: rgba(255,255,255,0.05);
  border: 0.5px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.5); font-family: inherit;
  font-size: 13px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.15s;
}
.ht-sim-btn:active { background: rgba(255,255,255,0.08); color: #fff; }
</style>
</head>

            <span style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:0.06em;">POIN DISIPLIN</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:12px;font-weight:900;background:linear-gradient(135deg,#FFF5A0,#FCD34D);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;" id="poinVal">50 <span style="-webkit-text-fill-color:rgba(255,255,255,0.3);font-size:10px;font-weight:500">/ 100</span></span>
            <div style="width:1px;height:14px;background:rgba(255,255,255,0.1);"></div>
            <span style="font-size:10px;">💰</span>
            <span style="font-size:12px;font-weight:900;color:#34D399;" id="totalGaji">Rp 0</span>
          </div>
        </div>
        <div style="height:4px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;">
          <div id="poinBar" style="height:100%;width:50%;border-radius:4px;background:linear-gradient(90deg,#FCD34D,#F59E0B);box-shadow:0 0 8px rgba(252,211,77,0.4);transition:width 0.6s cubic-bezier(0.22,1,0.36,1);"></div>
        </div>
      </div>

      <!-- ORDER MASUK CARD -->
      <div class="ht-order-card" id="orderCard">
        <div class="ht-order-header">
          <div class="ht-order-label">
            <div class="ht-order-blink"></div>
            Order Masuk
          </div>
          <div class="ht-order-timer" id="orderTimer">2:00</div>
        </div>
        <div class="ht-order-info">
          <div class="ht-order-avatar" id="orderClientAvatar">A</div>
          <div>
            <div class="ht-order-client" id="orderClientName">—</div>
            <div class="ht-order-detail" id="orderClientDetail">—</div>
          </div>
          <div style="text-align:right;margin-left:auto;">
            <div class="ht-order-price" id="orderPrice">—</div>
            <div style="font-size:9px;color:rgba(255,255,255,0.3);margin-top:2px;">yang kamu dapat</div>
          </div>
        </div>
        <div class="ht-order-progress">
          <div class="ht-order-progress-bar" id="orderProgressBar" style="width:100%"></div>
        </div>
        <div id="orderRevealBox" style="display:none;align-items:center;justify-content:space-between;margin-bottom:8px;gap:10px;">
          <div style="font-size:13px;font-weight:700;color:#34D399;" id="orderRevealNumber">—</div>
          <button onclick="salinNomor()" style="background:rgba(52,211,153,0.12);border:0.5px solid rgba(52,211,153,0.25);border-radius:8px;padding:5px 12px;color:#34D399;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;">Salin</button>
        </div>
        <div class="ht-order-actions" id="orderActions">
          <button class="ht-btn-tolak" onclick="tolakOrder()">Tolak</button>
          <button class="ht-btn-terima" onclick="terimaOrder()">Terima</button>
        </div>
        <button id="orderCloseBtn" onclick="closeOrder()" style="display:none;width:100%;height:36px;border-radius:10px;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px;">Tutup</button>
      </div>

      <!-- RIWAYAT ORDER -->
      <div style="margin-bottom:12px;">
        <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;padding:0 2px;">Riwayat Order</div>
        <div id="riwayatList">
          <div style="font-size:11px;color:rgba(255,255,255,0.2);text-align:center;padding:14px 0;">Belum ada riwayat order</div>
        </div>
      </div>

      <!-- SIMULASI BTN -->
      <button class="ht-sim-btn" onclick="simulasiOrder()">
        ⚡ Simulasi order masuk (demo)
      </button>

    </div>
  </div>

<script>
// ===== RIWAYAT ORDER =====
let riwayat = [];

function addRiwayat(status, wa, layanan, durasi, harga) {
  const now = new Date();
  const jam = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const nomor = status === 'terima' ? wa : '****' + wa.slice(-5);
  riwayat.unshift({ status, nomor, layanan, durasi, harga, jam });
  if (riwayat.length > 10) riwayat.pop();
  renderRiwayat();
}

function renderRiwayat() {
  const list = document.getElementById('riwayatList');
  if (riwayat.length === 0) {
    list.innerHTML = '<div style="font-size:11px;color:rgba(255,255,255,0.2);text-align:center;padding:14px 0;">Belum ada riwayat order</div>';
    return;
  }
  list.innerHTML = riwayat.map(r => {
    const isTerma = r.status === 'terima';
    const isTolak = r.status === 'tolak';
    const statusColor = isTerma ? '#34D399' : isTolak ? 'rgba(255,255,255,0.3)' : '#F87171';
    const statusText = isTerma ? '✓ Diterima' : isTolak ? '✕ Ditolak' : '⏰ Timeout';
    const statusBg = isTerma ? 'rgba(52,211,153,0.07)' : isTolak ? 'rgba(255,255,255,0.04)' : 'rgba(248,113,113,0.07)';
    const statusBorder = isTerma ? 'rgba(52,211,153,0.18)' : isTolak ? 'rgba(255,255,255,0.07)' : 'rgba(248,113,113,0.18)';
    const poinDelta = isTerma ? '+2 poin' : isTolak ? '—' : '-10 poin';
    const poinColor = isTerma ? '#34D399' : isTolak ? 'rgba(255,255,255,0.2)' : '#F87171';
    return `<div style="background:${statusBg};border:0.5px solid ${statusBorder};border-radius:12px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;">
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:700;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.nomor}</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.35);">${r.layanan} · ${r.durasi}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:11px;font-weight:800;color:#FCD34D;margin-bottom:2px;">${r.harga}</div>
        <div style="font-size:9px;font-weight:700;color:${statusColor};">${statusText}</div>
        <div style="font-size:9px;font-weight:700;color:${poinColor};margin-top:1px;">${poinDelta}</div>
      </div>
      <div style="font-size:9px;color:rgba(255,255,255,0.2);flex-shrink:0;padding-left:4px;">${r.jam}</div>
    </div>`;
  }).join('');
}
let totalGaji = 0;
let poin = 50;

function updateGaji(nominal) {
  totalGaji += nominal;
  document.getElementById('totalGaji').textContent = 'Rp ' + totalGaji.toLocaleString('id');
}

function updatePoin(delta) {
  poin = Math.max(0, Math.min(100, poin + delta));
  document.getElementById('poinVal').innerHTML = poin + ' <span>/ 100</span>';
  document.getElementById('poinBar').style.width = poin + '%';

  // Warna bar sesuai poin
  const bar = document.getElementById('poinBar');
  if (poin >= 80) {
    bar.style.background = 'linear-gradient(90deg,#FCD34D,#F59E0B)';
    bar.style.boxShadow = '0 0 8px rgba(252,211,77,0.4)';
  } else if (poin >= 50) {
    bar.style.background = 'linear-gradient(90deg,#34D399,#10B981)';
    bar.style.boxShadow = '0 0 8px rgba(52,211,153,0.4)';
  } else {
    bar.style.background = 'linear-gradient(90deg,#F87171,#EF4444)';
    bar.style.boxShadow = '0 0 8px rgba(248,113,113,0.4)';
  }

  if (delta > 0) showToast('⭐ +' + delta + ' poin! Total: ' + poin + '/100');
  else if (delta < 0) showToast('⚠️ ' + Math.abs(delta) + ' poin berkurang! Total: ' + poin + '/100');
}
let isOnline = true;
function toggleOnline() {
  isOnline = !isOnline;
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const sub = document.getElementById('statusSub');
  const track = document.getElementById('switchTrack');
  const thumb = document.getElementById('switchThumb');
  if (isOnline) {
    dot.className = 'ht-online-dot';
    text.textContent = 'Online — Siap menerima order';
    sub.textContent = 'Profilmu tampil di list customer';
    track.classList.add('on'); thumb.classList.add('on');
  } else {
    dot.className = 'ht-offline-dot';
    text.textContent = 'Offline — Tidak menerima order';
    sub.textContent = 'Profilmu disembunyikan dari customer';
    track.classList.remove('on'); thumb.classList.remove('on');
  }
}

// ===== ORDER MASUK =====
let orderInterval = null;
let orderSeconds = 120;

const DEMO_ORDERS = [
  { wa: '081234512345', layanan: 'Sleep Call', durasi: '60 menit', harga: 75000, avatar: 'A' },
  { wa: '082198765432', layanan: 'Teman Call', durasi: '30 menit', harga: 30000, avatar: 'R' },
  { wa: '085261754085', layanan: 'Curhat Call', durasi: '40 menit', harga: 20000, avatar: 'S' },
  { wa: '089987601234', layanan: 'Pacar Virtual', durasi: '45 menit', harga: 30000, avatar: 'B' },
];

let currentOrderWA = '';

let lastOrder = {};

function simulasiOrder() {
  if (document.getElementById('orderCard').classList.contains('show')) return;
  const order = DEMO_ORDERS[Math.floor(Math.random() * DEMO_ORDERS.length)];
  const talentCut = Math.round(order.harga * 0.6);
  currentOrderWA = order.wa;
  lastOrder = { wa: order.wa, layanan: order.layanan, durasi: order.durasi, harga: 'Rp ' + talentCut.toLocaleString('id'), nominal: talentCut };

  const maskedWA = '****' + order.wa.slice(-5);
  document.getElementById('orderClientAvatar').textContent = order.avatar;
  document.getElementById('orderClientName').textContent = maskedWA + ' · ' + order.layanan;
  document.getElementById('orderClientDetail').textContent = order.durasi;
  document.getElementById('orderPrice').textContent = 'Rp ' + talentCut.toLocaleString('id');
  document.getElementById('orderCard').classList.add('show');
  document.getElementById('orderRevealBox').style.display = 'none';
  orderSeconds = 120;
  updateTimer();
  orderInterval = setInterval(() => {
    orderSeconds--;
    updateTimer();
    if (orderSeconds <= 0) { clearInterval(orderInterval); timeoutOrder(); }
  }, 1000);
}

function updateTimer() {
  const m = Math.floor(orderSeconds / 60);
  const s = orderSeconds % 60;
  const el = document.getElementById('orderTimer');
  el.textContent = m + ':' + String(s).padStart(2, '0');
  el.className = orderSeconds <= 30 ? 'ht-order-timer urgent' : 'ht-order-timer';
  document.getElementById('orderProgressBar').style.width = (orderSeconds / 120 * 100) + '%';
}

function tolakOrder() {
  clearInterval(orderInterval);
  document.getElementById('orderCard').classList.remove('show');
  addRiwayat('tolak', lastOrder.wa, lastOrder.layanan, lastOrder.durasi, lastOrder.harga);
}

function terimaOrder() {
  clearInterval(orderInterval);
  const layanan = document.getElementById('orderClientName').textContent.split(' · ')[1];
  document.getElementById('orderClientName').textContent = currentOrderWA + ' · ' + layanan;
  document.getElementById('orderRevealBox').style.display = 'flex';
  document.getElementById('orderRevealNumber').textContent = currentOrderWA;
  document.getElementById('orderActions').style.display = 'none';
  document.getElementById('orderCloseBtn').style.display = 'block';
  document.getElementById('orderTimer').textContent = '✓';
  document.getElementById('orderTimer').style.color = '#34D399';
  document.getElementById('orderProgressBar').style.width = '100%';
  document.getElementById('orderProgressBar').style.background = '#34D399';

  // Auto salin nomor
  navigator.clipboard.writeText(currentOrderWA).then(() => {
    showToast('📋 Nomor ' + currentOrderWA + ' tersalin!');
  }).catch(() => {
    showToast('✅ Order diterima! Nomor: ' + currentOrderWA);
  });
  setTimeout(() => updatePoin(2), 1500);
  updateGaji(lastOrder.nominal);
  addRiwayat('terima', currentOrderWA, lastOrder.layanan, lastOrder.durasi, lastOrder.harga);
}

function showToast(msg) {
  const existing = document.getElementById('ht-toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'ht-toast';
  toast.textContent = msg;
  toast.style.cssText = `
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #1E2A1E; border: 0.5px solid rgba(52,211,153,0.4);
    color: #34D399; font-size: 12px; font-weight: 700;
    padding: 10px 18px; border-radius: 20px; z-index: 9999;
    white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: toastIn 0.25s cubic-bezier(0.22,1,0.36,1);
    font-family: 'Inter', sans-serif;
  `;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function salinNomor() {
  navigator.clipboard.writeText(currentOrderWA).then(() => {
    const btn = document.querySelector('#orderRevealBox button');
    btn.textContent = '✓ Tersalin';
    btn.style.color = '#34D399';
    setTimeout(() => { btn.textContent = 'Salin'; }, 2000);
  });
}

function closeOrder() {
  document.getElementById('orderCard').classList.remove('show');
  document.getElementById('orderActions').style.display = 'flex';
  document.getElementById('orderCloseBtn').style.display = 'none';
  document.getElementById('orderRevealBox').style.display = 'none';
}

function timeoutOrder() {
  document.getElementById('orderCard').classList.remove('show');
  addRiwayat('timeout', lastOrder.wa, lastOrder.layanan, lastOrder.durasi, lastOrder.harga);
  updatePoin(-10);
  if (isOnline) {
    isOnline = false;
    toggleOnline();
    showToast('⏰ Tidak ada respons — otomatis offline');
  }
}
</script>
</body>
</html>
